name: iPSX2 iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: brew install cmake ninja

      - name: Create Build Directory
        run: mkdir -p build/ios_device

      - name: Generate Xcode Project
        # This step creates the iPSX2.xcodeproj file that was missing
        run: |
          cmake -S . -B build/ios_device \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0

      - name: Run Build Script
        run: |
          # Ensure the script is executable
          chmod +x ./scripts/build_device.sh
          # Run with --ipa-only to skip the physical device check
          ./scripts/build_device.sh --ipa-only

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: iPSX2-Accuracy-Build
          path: build/ios_device/Release-iphoneos/iPSX2.ipa
