name: iPSX2 iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch: # This button lets you start a build from your phone!

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          submodules: recursive # This pulls the missing Common.h/VMManager files

      - name: Install Dependencies
        run: brew install cmake ninja

      - name: Run Build Script
        run: |
          chmod +x ./scripts/build_device.sh
          ./scripts/build_device.sh --ipa-only

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: iPSX2-Accuracy-Build
          path: release/iPSX2.ipa